{{/*
  theme-selector.html — exampleSite-only preview widget.

  Emits a <select> listing a handful of base16 schemes, plus a small inline
  module that swaps every --baseXX CSS custom property on selection. Runs
  entirely client-side, with no page reload, so the whole theme re-tints in
  place as proof that the palette drives every surface on the site.
*/}}
<div class="theme-selector">
  <label class="theme-selector__label" for="theme-selector">preview palette:</label>
  <select id="theme-selector" class="theme-selector__input">
    <option value="">Kanagawa (current)</option>
    <option value="tokyo-night-storm">Tokyo Night Storm</option>
    <option value="gruvbox-dark">Gruvbox Dark</option>
    <option value="nord">Nord</option>
    <option value="catppuccin-mocha">Catppuccin Mocha</option>
    <option value="solarized-dark">Solarized Dark</option>
    <option value="github-light">GitHub Light</option>
  </select>
</div>

const sel = document.getElementById('theme-selector');
sel.addEventListener('change', () => {
  const scheme = schemes[sel.value];
  if (!scheme) return;
  const root = document.documentElement;
  for (const [k, v] of Object.entries(scheme)) {
    root.style.setProperty(`--${k}`, `#${v}`);
  }
});
